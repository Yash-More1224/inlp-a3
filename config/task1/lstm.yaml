model:
  embedding_dim: 256
  hidden_size: 512
  num_layers: 2          # stacked 2-layer LSTM for better decryption quality
  dropout: 0.3

training:
  seed: 42
  device: cuda
  epochs: 100            # more training budget
  resume: true
  batch_size: 128        # larger for GPU efficiency
  learning_rate: 0.001
  lr_scheduler: cosine   # cosine annealing LR schedule
  lr_min: 1.0e-5         # floor for cosine scheduler

data:
  data_dir: data
  seq_len: 256           # longer context to capture more characters per step
  step: 64               # overlapping windows for denser training signal
  train_ratio: 0.8
  val_ratio: 0.1

output:
  base_dir: outputs
  checkpoint_path: outputs/logs/checkpoints/task1_{model}.pt

logging:
  use_wandb: true
  project: inlp-assignment3

hf:
  push: false
  repo_id: ""
  token: null
