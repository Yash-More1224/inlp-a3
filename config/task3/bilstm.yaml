seed: 42
device: cuda
batch_size: 256
confidence_threshold: 0.30

input_file: null
output_text_file: null

data:
  data_dir: data
  seq_len: 128
  noisy_files:
    - cipher_01.txt
    - cipher_02.txt
    - cipher_03.txt
    - cipher_04.txt

output:
  base_dir: outputs
  result_file: task3_bilstm.txt

logging:
  use_wandb: true
  project: inlp-assignment3
  wandb_api_key: null

decryption_model:
  cell_type: lstm
  embedding_dim: 256
  hidden_size: 512
  dropout: 0.2
  num_layers: 1
  checkpoint_path: outputs/logs/checkpoints/task1_lstm.pt
  hf_filename: task1_lstm.pt
  hf:
    repo_id: "yashmore1224/inlp-final"
    token: null

language_model:
  type: bilstm
  embedding_dim: 64
  hidden_size: 512
  dropout: 0.2
  seq_len: 256
  checkpoint_path: outputs/logs/checkpoints/task2_bilstm.pt
  hf_filename: task2_bilstm.pt
  hf:
    repo_id: "yashmore1224/inlp-final"
    token: null
