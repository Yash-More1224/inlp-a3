model:
  embedding_dim: 256
  state_size: 512        # sized for ~94K word vocab
  dropout: 0.2

training:
  seed: 42
  device: cuda
  epochs: 50
  batch_size: 256
  learning_rate: 0.001
  lr_min: 1.0e-6
  weight_decay: 1.0e-4
  patience: 10

data:
  data_dir: data
  seq_len: 256
  step: 32
  train_ratio: 0.8
  val_ratio: 0.1

output:
  base_dir: outputs
  checkpoint_path: outputs/logs/checkpoints/task2_{model}.pt

logging:
  use_wandb: true
  project: inlp-assignment3

hf:
  push: false
  repo_id: ""
  token: null
