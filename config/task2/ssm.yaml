model:
  embedding_dim: 256
  state_size: 512
  dropout: 0.1

training:
  seed: 42
  device: cuda
  epochs: 20
  batch_size: 32
  learning_rate: 0.0005

data:
  data_dir: data
  seq_len: 64
  step: 32
  train_ratio: 0.8
  val_ratio: 0.1

output:
  base_dir: outputs
  checkpoint_path: outputs/logs/checkpoints/task2_{model}.pt

logging:
  use_wandb: true
  project: inlp-assignment3

