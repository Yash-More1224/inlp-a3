model:
  embedding_dim: 64      # chars need far smaller embeddings than words
  hidden_size: 512       # larger hidden for capturing char-level patterns
  dropout: 0.2

training:
  seed: 42
  device: cuda
  epochs: 50
  batch_size: 256        # larger batches OK since vocab is now tiny (~80)
  learning_rate: 0.001
  lr_min: 1.0e-6         # CosineAnnealingLR floor
  weight_decay: 1.0e-4
  patience: 10           # more patience for char-level convergence

data:
  data_dir: data
  seq_len: 256           # 256 chars ≈ 40-50 word context window
  step: 32
  mask_prob: 0.15        # same MLM masking rate
  train_ratio: 0.8
  val_ratio: 0.1

output:
  base_dir: outputs
  checkpoint_path: outputs/logs/checkpoints/task2_{model}.pt

logging:
  use_wandb: true
  project: inlp-assignment3

hf:
  push: false
  repo_id: ""
  token: null
